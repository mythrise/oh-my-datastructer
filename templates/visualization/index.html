<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAME}} — 3D 可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: "JetBrains Mono", "Fira Code", monospace;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
        }

        /* Glassmorphism 基础面板 */
        .glass-panel {
            position: fixed;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 16px;
            z-index: 10;
        }

        /* 左上 — 项目信息 */
        #info-panel {
            top: 20px; left: 20px;
            min-width: 250px;
        }

        #info-panel h1 {
            font-size: 16px;
            color: #00f3ff;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        #info-panel .meta {
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }

        /* 右上 — 统计面板 */
        #stats-panel {
            top: 20px; right: 20px;
            min-width: 200px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label { color: #888; }
        .stat-value { color: #00f3ff; font-weight: bold; }

        /* 右下 — 详情面板 */
        #detail-panel {
            bottom: 20px; right: 20px;
            min-width: 260px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        #detail-panel h3 {
            font-size: 14px;
            color: #a855f7;
            margin-bottom: 8px;
        }

        #detail-panel .detail-row {
            font-size: 12px;
            padding: 3px 0;
            color: #ccc;
        }

        /* 左下 — 控制面板 */
        #control-panel {
            bottom: 20px; left: 20px;
            min-width: 200px;
        }

        .ctrl-btn {
            background: rgba(0, 243, 255, 0.15);
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: #00f3ff;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            margin: 4px;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            background: rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.3);
        }

        /* 加载提示 */
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: #00f3ff;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="loading">加载中...</div>

    <!-- 左上: 项目信息 -->
    <div id="info-panel" class="glass-panel">
        <h1>{{PROJECT_NAME}}</h1>
        <div class="meta">
            <div>类型: <span id="ds-type">—</span></div>
            <div>算法: <span id="algo-name">—</span></div>
            <div>数据规模: <span id="data-size">—</span></div>
        </div>
    </div>

    <!-- 右上: 统计面板 -->
    <div id="stats-panel" class="glass-panel">
        <div id="stats-container">
            <!-- 由 main.js 动态填充 -->
        </div>
    </div>

    <!-- 左下: 控制面板 -->
    <div id="control-panel" class="glass-panel">
        <button class="ctrl-btn" onclick="resetCamera()">重置视角</button>
        <button class="ctrl-btn" onclick="toggleLabels()">标签</button>
        <button class="ctrl-btn" onclick="toggleAnimation()">动画</button>
    </div>

    <!-- 右下: 详情面板 -->
    <div id="detail-panel" class="glass-panel">
        <h3>节点详情</h3>
        <div id="detail-content"></div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

    <!-- 可视化数据 -->
    <script>
        // 由 /ds:visualize 生成，或从 viz_data.json 加载
        let VIZ_DATA = null;

        async function loadData() {
            try {
                const resp = await fetch("viz_data.json");
                VIZ_DATA = await resp.json();
                document.getElementById("loading").style.display = "none";
                initScene();
            } catch (e) {
                document.getElementById("loading").textContent = "请先运行 /ds:visualize 生成数据";
            }
        }

        loadData();
    </script>

    <!-- 主渲染逻辑 -->
    <script src="main.js"></script>
</body>
</html>
